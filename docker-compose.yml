version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: pastehub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pastehub
      POSTGRES_PASSWORD: pastehub
      POSTGRES_DB: pastehub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pastehub"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: pastehub-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://pastehub:pastehub@db:5432/pastehub
      SECRET_KEY: ${SECRET_KEY:-super-secret-change-this-in-production}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: pastehub-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
